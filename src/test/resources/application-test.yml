# ============================================
# Configuration de test
# ============================================
server:
  port: 0
# ============================================
# Configuration Sécurité (AJOUTÉ POUR LA PIPELINE)
# ============================================
app:
  security:
    swagger:
      user: admin_audit
      password: admin_audit_secret

# ============================================
# Configuration Penpot (Valeurs statiques de test)
# ============================================
penpot:
  ai:
    router:
      model: llama3.1
      temperature: 0.0
      max-tokens: 64
    executor:
      model: qwen3:8b
      temperature: 0.0
      max-tokens: 512
      num-ctx: 2048
    server-address: localhost
    websocket-port: 0
    repl-port: 0
    remote-mode: false
    multi-user: false
    log-level: warn
    log-dir: target/test-logs
    file-system-access: false
    chat:
      memory:
        max-messages: 10
    rag:
      templates-path: classpath:data/rag/templates/*.json
      similarity-threshold: 0.5
      top-k: 3
      query-variants: 1

# ============================================
# Configuration Spring AI - pointe vers WireMock
# ============================================
spring:
  ai:
    ollama:
      base-url: http://localhost:${wiremock.server.port:8080}
      chat:
        options:
          # Rétablissement des valeurs statiques pour isoler l'environnement de test
          model: qwen3:8b
          temperature: 0.0
          max-tokens: 512
          num_ctx: 2048
        observations:
          log-prompt: false
      embedding:
        options:
          model: hf.co/unsloth/embeddinggemma-300m-GGUF:Q8_0

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
   

  # ============================================
  # Base de données H2 en mémoire pour les tests
  # ============================================
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration 

# ============================================
# Logs
# ============================================
logging:
  level:
    com.penpot.ai: WARN
    org.springframework.ai: WARN
    org.springframework.web.socket: WARN
    org.hibernate: WARN
  file:
    name: target/test-logs/penpot-test.log

crypto:
  master-key: 5d8b57a473a25517d5b30e8675b66a050b41238072374b3d810e6598dab5f194