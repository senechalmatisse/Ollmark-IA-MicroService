server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: penpot-ai-server

  # =================================
  # DÉSACTIVER AUTO-CONFIG OLLAMA
  # (évite le conflit EmbeddingModel/ChatModel)
  # =================================
  autoconfigure:
    exclude:
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration

  ai:
    # =================================
    # OPENROUTER CONFIG
    # =================================
    openai:
      base-url: https://openrouter.ai/api
      api-key: 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
      chat:
        options:
          temperature: 0.7
          max-tokens: 4096

    # =================================
    # EMBEDDING MODEL (via OpenRouter)
    # =================================
    embedding:
      options:
        model: google/gemini-embedding-001

    # =================================
    # CHAT MEMORY
    # =================================
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never

  datasource:
    url: jdbc:postgresql://localhost:5433/penpot_ai
    username: penpot_ai
    password: penpot_ai_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

# =================================
# PENPOT AI CONFIG
# =================================
penpot:
  ai:
    # Fournisseur actif : ollama | openrouter
    provider: openrouter

    router:
      model: qwen/qwen-2.5-7b-instruct
      temperature: 0.0
      max-tokens: 256

    executor:
      model: qwen/qwen3.5-35b-a3b
      temperature: 0.7
      max-tokens: 4096

    server-address: localhost
    websocket-port: 4401
    repl-port: 4403
    remote-mode: false
    multi-user: false
    log-level: debug
    log-dir: logs
    file-system-access: true

    chat:
      memory:
        max-messages: 50

    rag:
      templates-path: classpath:data/rag/templates/*.json
      similarity-threshold: 0.5
      top-k: 5
      query-variants: 3
      eager-embedding: true

# =================================
# LOGGING
# =================================
logging:
  level:
    com.penpot.ai: DEBUG
    org.springframework.ai.chat.client: TRACE
    org.springframework.ai.rag: DEBUG
    org.springframework.ai.chat.memory: DEBUG
    org.springframework.ai.chat.memory.repository.jdbc: DEBUG
    org.springframework.ai.chat.client.advisor: DEBUG
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: DEBUG
    com.penpot.ai.adapters.out.ai.RequestComplexityAnalyzer: DEBUG
    org.springframework.ai.openai: DEBUG
    org.springframework.web.socket: INFO
    org.springframework.web.client: INFO

  file:
    name: logs/penpot.log

  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 100MB

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# =================================
# ACTUATOR
# =================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,refresh
  endpoint:
    health:
      show-details: when-authorized