spring:
  application:
    name: penpot-ai-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://10.130.163.62:11434/}

      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:qwen3.5:35b}
          temperature: ${PENPOT_EXECUTOR_TEMPERATURE:0.7}
          top-p: ${PENPOT_EXECUTOR_TOP_P:0.95}
          top-k: ${PENPOT_EXECUTOR_TOP_K:5}
          repeat-penalty: ${PENPOT_EXECUTOR_REPEAT_PENALTY:1.15}
          presence-penalty: ${PENPOT_EXECUTOR_PRESENCE_PENALTY:0.3}
          max-tokens: ${PENPOT_EXECUTOR_MAX_TOKENS:4096}
          num-ctx: ${PENPOT_EXECUTOR_NUM_CTX:32000}

        observations:
          log-prompt: ${SPRING_AI_LOG_PROMPT:false}

      tools:
        observations:
          include-content: true

      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

    # =================================
    # OPENROUTER
    # =================================
    openai:
      base-url: https://openrouter.ai/api
      api-key: ${OPENROUTER_API_KEY}

      chat:
        options:
          model: ${OPENROUTER_CHAT_MODEL:qwen/qwen3.5-397b-a17b}
          temperature: ${PENPOT_EXECUTOR_TEMPERATURE:0.7}
          max-tokens: ${PENPOT_EXECUTOR_MAX_TOKENS:4096}

      embedding:
        options:
          model: google/gemini-embedding-001
    # =================================
    # CHAT MEMORY
    # =================================
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never

# ── SERVER ─────────────────────────
server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0

# ── Configuration AI commune (overridable par profil) ──────────────────────
penpot:
  ai:
    #  SWITCH GLOBAL
    provider: ${AI_PROVIDER:openrouter}

    router:
      model: openai/gpt-4o-mini
      temperature: ${PENPOT_ROUTER_TEMPERATURE:0.0}
      top-p: ${PENPOT_ROUTER_TOP_P:0.9}
      top-k: ${PENPOT_ROUTER_TOP_K:10}
      repeat-penalty: ${PENPOT_ROUTER_REPEAT_PENALTY:1.05}
      max-tokens: ${PENPOT_ROUTER_MAX_TOKENS:256}
      num-ctx: ${PENPOT_ROUTER_NUM_CTX:8192}

    executor:
      model: qwen/qwen3.5-397b-a17b
      temperature: ${PENPOT_EXECUTOR_TEMPERATURE:0.7}
      top-p: ${PENPOT_EXECUTOR_TOP_P:0.95}
      top-k: ${PENPOT_EXECUTOR_TOP_K:20}
      repeat-penalty: ${PENPOT_EXECUTOR_REPEAT_PENALTY:1.15}
      presence-penalty: ${PENPOT_EXECUTOR_PRESENCE_PENALTY:0.3}
      max-tokens: ${PENPOT_EXECUTOR_MAX_TOKENS:4096}
      num-ctx: ${PENPOT_EXECUTOR_NUM_CTX:32000}

    chat:
      memory:
        max-messages: ${PENPOT_CHAT_MEMORY_MAX_MESSAGES:50}

    rag:
      templates-path: ${PENPOT_RAG_TEMPLATES_PATH:classpath:data/rag/templates/*.json}
      similarity-threshold: ${PENPOT_RAG_SIMILARITY_THRESHOLD:0.5}
      top-k: ${PENPOT_RAG_TOP_K:3}
      query-variants: ${PENPOT_RAG_QUERY_VARIANTS:2}
      eager-embedding: ${PENPOT_RAG_EAGER_EMBEDDING:true}

    repl-port: ${PENPOT_REPL_PORT:4403}
    remote-mode: ${PENPOT_REMOTE_MODE:false}
    multi-user: ${PENPOT_MULTI_USER:false}
    file-system-access: true
    log-dir: ${PENPOT_LOG_DIR:logs}

# ── Format des logs (commun à tous les profils) ────────────────────────────
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${penpot.ai.log-dir}/penpot.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 100MB

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,refresh
  endpoint:
    health:
      show-details: when-authorized

# ============================================
# Sécurité de l'interface Swagger/OpenAPI
# ============================================
app:
  security:
    swagger:
      user: ${SWAGGER_USER:admin_audit}
      password: ${SWAGGER_PASSWORD}

# ============================================
# Configuration SpringDoc (Swagger UI)
# ============================================
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    # Trie les endpoints par méthode HTTP
    operations-sorter: method
    # Permet de garder la session d'authentification active
    persist-authorization: true

# Configuration de Jasypt pour l'encryption des propriétés sensibles
crypto:
  master-key: ${CRYPTO_MASTER_KEY}
