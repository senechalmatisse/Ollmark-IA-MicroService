# ============================================
# Configuration du serveur Penpot
# ============================================

server:
  port: 8080
  address: 0.0.0.0

# ============================================
# Configuration Penpot
# ============================================
penpot:
  ai:
    # =============================
    # CONFIGURATION DUAL-MODEL
    # =============================

    # Modèle léger de routage (classification d’intention)
    router:
      model: ${PENPOT_ROUTER_MODEL:llama3.1}
      temperature: ${PENPOT_ROUTER_TEMPERATURE:0.0}
      max-tokens: ${PENPOT_ROUTER_MAX_TOKENS:256}

    # Modèle exécuteur principal (tool calling + génération)
    executor:
        model: ${PENPOT_EXECUTOR_MODEL:qwen3:8b}
        temperature: ${PENPOT_EXECUTOR_TEMPERATURE:0.7}
        max-tokens: ${PENPOT_EXECUTOR_MAX_TOKENS:4096}
        num-ctx: ${PENPOT_EXECUTOR_NUM_CTX:32000}

    # Adresse du serveur pour les clients externes
    server-address: ${PENPOT_SERVER_ADDRESS:localhost}
    # Port WebSocket pour la communication avec le plugin
    websocket-port: ${PENPOT_WEBSOCKET_PORT:8080}
    # Port REPL (si activé)
    repl-port: ${PENPOT_REPL_PORT:4403}
    # Mode distant : true si le plugin est hébergé ailleurs
    remote-mode: ${PENPOT_REMOTE_MODE:false}
    # Mode multi-utilisateur : permet plusieurs connexions simultanées
    multi-user: ${PENPOT_MULTI_USER:false}
    # Niveau de log : trace, debug, info, warn, error
    log-level: ${PENPOT_LOG_LEVEL:debug}
    # Répertoire pour les fichiers de log
    log-dir: ${PENPOT_LOG_DIR:logs}
    # Accès au système de fichiers (pour les opérations futures)
    file-system-access: true
    # Configuration de la mémoire de conversation
    chat:
      memory:
        # Nombre maximum de messages à conserver en mémoire par conversation
        # Plus cette valeur est élevée, plus le contexte est maintenu, mais plus la consommation mémoire augmente
        max-messages: ${PENPOT_CHAT_MEMORY_MAX_MESSAGES:50}
    # Configuration RAG (Retrieval-Augmented Generation) pour les templates marketing
    rag:
      # Chemin vers les fichiers de templates (supporte les wildcards)
      templates-path: ${PENPOT_RAG_TEMPLATES_PATH:classpath:data/rag/templates/*.json}
      # Seuil de similarité pour la recherche sémantique (0.0 à 1.0)
      # Plus élevé = correspondances plus strictes
      similarity-threshold: ${PENPOT_RAG_SIMILARITY_THRESHOLD:0.5}
      # Nombre de templates à retourner lors d'une recherche
      top-k: ${PENPOT_RAG_TOP_K:5}
      # Nombre de variantes générées
      query-variants: ${PENPOT_RAG_QUERY_VARIANTS:3}
      eager-embedding: true

# ============================================
# Configuration Spring AI avec Ollama
# ============================================
spring:
  ai:
    ollama:
      # URL de base d'Ollama sur la VM distante
      # Interface graphique Open WebUI : http://10.130.163.62:3000/
      # VM
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434/}
      # PC FAC
      #base-url: ${OLLAMA_BASE_URL:http://192.168.41.3:11434}

      # Configuration du chat (génération de texte)
      chat:
        options:
          # Modèle à utiliser (configurable via Open WebUI)
          model: ${OLLAMA_MODEL:qwen3:8b}
          # Température (0.0 = déterministe, 1.0+ = créatif)
          temperature: ${OLLAMA_TEMPERATURE:0.7}
          # Nombre maximum de tokens dans la réponse
          max-tokens: ${OLLAMA_MAX_TOKENS:32000}
          function-calling: auto
          num_ctx: 32000
        # Loggue le prompt complet envoyé au modèle (dev uniquement)
        observations:
          log-prompt: ${SPRING_AI_LOG_PROMPT:false}

      tools:
        observations:
          include-content: true

      # Configuration des embeddings (pour la recherche sémantique)
      embedding:
        options:
          # Modèle d'embedding pour le RAG
          model: ${OLLAMA_EMBEDDING_MODEL:hf.co/unsloth/embeddinggemma-300m-GGUF:Q8_0}

    # ============================================
    # CONFIGURATION CHAT MEMORY
    # ============================================
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never

  datasource:
    url: jdbc:postgresql://localhost:5433/penpot_ai
    username: penpot_ai
    password: penpot_ai_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration        
# ============================================
# Configuration des logs
# ============================================
logging:
  level:
    com.penpot.ai: ${penpot.ai.log-level:DEBUG}
    org.springframework.ai.chat.client: TRACE
    org.springframework.ai.rag: DEBUG
    org.springframework.ai.chat.memory: DEBUG
    org.springframework.ai.chat.memory.repository.jdbc: DEBUG
    org.springframework.ai.chat.client.advisor: DEBUG
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: DEBUG
    com.penpot.ai.adapters.out.ai.RequestComplexityAnalyzer: DEBUG
    org.springframework.ai.ollama: ${penpot.ai.log-level}
    org.springframework.web.socket: INFO
    org.springframework.web.client: INFO

  # Configuration du fichier de log
  file:
    name: ${penpot.ai.log-dir}/penpot.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 100MB

  # Format des logs
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ============================================
# Configuration Spring Boot
# ============================================
  application:
    name: penpot-ai-server

  # Désactiver certaines auto-configurations si nécessaire
  autoconfigure:
    exclude:
      # Exclure si vous n'utilisez pas certaines fonctionnalités
      # - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ============================================
# Configuration des endpoints Actuator (monitoring)
# ============================================
management:
  endpoints:
    web:
      exposure:
        # Exposer certains endpoints pour le monitoring
        include: health,info,metrics,loggers,refresh
  endpoint:
    health:
      show-details: when-authorized

# ============================================
# Notes de configuration
# ============================================
# 
# OLLAMA VM DISTANTE :
# - Interface Open WebUI : http://10.130.163.62:3000/
#   → Utilisez cette interface pour gérer les modèles, voir l'historique, etc.
#   → Authentification requise (user/password)
# 
# - API Ollama directe : http://10.130.163.62:11434/
#   → Pour les requêtes HTTP directes sans UI
#   → Exemple : curl http://10.130.163.62:11434/api/tags
# 
# MODÈLES :
# - Chat : qwen3:8b
# - Embeddings : embeddinggemma-300m
# 
# VARIABLES D'ENVIRONNEMENT :
# Toutes les valeurs peuvent être surchargées via des variables d'environnement.
# Exemple : export OLLAMA_MODEL=llama3:8b
# 
# CHAT MEMORY :
# - La table SPRING_AI_CHAT_MEMORY sera créée automatiquement au démarrage
# - Stocke automatiquement l'historique des conversations
# - Limite : 20 messages par défaut (configurable via penpot.ai.chat.memory.max-messages)
# - Persiste dans H2 (survit aux redémarrages)
# 
# RAG TEMPLATES :
# - Templates marketing pré-configurés
# - Recherche sémantique via embeddings Ollama
# - Extensible : ajoutez vos propres templates JSON
# 
# ============================================
