# ═══════════════════════════════════════════════════════════════════
# Profil DEV
# ═══════════════════════════════════════════════════════════════════

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  ai:
    # =================================
    # OLLAMA (fallback uniquement)
    # =================================
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://10.130.163.62:11434/}

      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:qwen3.5:35b}
          temperature: ${PENPOT_EXECUTOR_TEMPERATURE:0.7}
          top-p: ${PENPOT_EXECUTOR_TOP_P:0.95}
          top-k: ${PENPOT_EXECUTOR_TOP_K:3}
          repeat-penalty: ${PENPOT_EXECUTOR_REPEAT_PENALTY:1.15}
          presence-penalty: ${PENPOT_EXECUTOR_PRESENCE_PENALTY:0.3}
          max-tokens: ${PENPOT_EXECUTOR_MAX_TOKENS:4096}
          num-ctx: ${PENPOT_EXECUTOR_NUM_CTX:32000}
        observations:
          log-prompt: ${SPRING_AI_LOG_PROMPT:false}

      tools:
        observations:
          include-content: true

      # fallback embedding local
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:hf.co/unsloth/embeddinggemma-300m-GGUF:Q8_0

    # =================================
    # OPENROUTER
    # =================================
    openai:
      base-url: https://openrouter.ai/api
      api-key: ${OPENROUTER_API_KEY}

      chat:
        options:
          model: ${OPENROUTER_CHAT_MODEL:qwen/qwen3.5-397b-a17b}
          temperature: 0.7
          max-tokens: 4096

      # embedding principal RAG
      embedding:
        options:
          model: google/gemini-embedding-001

    # =================================
    # CHAT MEMORY
    # =================================
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never

# ─────────────────────────────────────────────
# CONFIG AI
# ─────────────────────────────────────────────
penpot:
  ai:
    provider: ${AI_PROVIDER:openrouter}
    server-address: ${PENPOT_SERVER_ADDRESS:10.130.163.57}
    websocket-port: ${PENPOT_WEBSOCKET_PORT:50030}

    rag:
      templates-path: classpath:data/rag/templates/*.json
      similarity-threshold: 0.5
      top-k: 3
      query-variants: 2
      eager-embedding: true

# ── CORS ──────────────────────────────────────
cors:
  allowed-origins: >
    http://10.130.163.57,
    https://10.130.163.57,
    http://10.130.163.57:50012,
    https://10.130.163.57:50012,
    http://10.130.163.57:50030,
    https://10.130.163.57:50030,
    http://10.130.163.62:11434/,
    https://10.130.163.62:11434/,
    https://design.penpot.app

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    com.penpot.ai: DEBUG
    org.springframework.ai.chat.client: TRACE
    org.springframework.ai.rag: DEBUG
    org.springframework.ai.chat.memory: DEBUG
    org.springframework.ai.ollama: DEBUG
    org.springframework.web.socket: INFO
    org.springframework.web.client: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.ai.chat.client.advisor: DEBUG
    com.penpot.ai.adapters.out.ai.RequestComplexityAnalyzer: DEBUG
