# ── Logging détaillé ───────────────────────────────────────────────
# ── Logging détaillé ───────────────────────────────────────────────
logging:
  level:
    com.penpot.ai: DEBUG
    org.springframework.ai.chat.client: TRACE
    org.springframework.ai.rag: DEBUG
    org.springframework.ai.chat.memory: DEBUG
    org.springframework.ai.ollama: DEBUG
    org.springframework.web.socket: INFO
    org.springframework.web.client: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.ai.chat.client.advisor: DEBUG
    com.penpot.ai.adapters.out.ai.RequestComplexityAnalyzer: DEBUG