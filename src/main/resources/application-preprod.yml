# ═══════════════════════════════════════════════════════════════════
# Profil PREPROD
# ═══════════════════════════════════════════════════════════════════

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  ai:
    # =================================
    # OLLAMA (fallback interne)
    # =================================
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://10.130.163.62:11434/}

      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:qwen3.5:9b}   # fallback seulement
          temperature: ${PENPOT_EXECUTOR_TEMPERATURE:0.7}
          top-p: ${PENPOT_EXECUTOR_TOP_P:0.95}
          top-k: ${PENPOT_EXECUTOR_TOP_K:20}
          repeat-penalty: ${PENPOT_EXECUTOR_REPEAT_PENALTY:1.15}
          presence-penalty: ${PENPOT_EXECUTOR_PRESENCE_PENALTY:0.3}
          max-tokens: ${PENPOT_EXECUTOR_MAX_TOKENS:4096}
          num-ctx: ${PENPOT_EXECUTOR_NUM_CTX:32000}

        observations:
          log-prompt: ${SPRING_AI_LOG_PROMPT:false}

      tools:
        observations:
          include-content: true

      # fallback embedding local (remplace proprement l'ancien)
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

    # =================================
    # OPENROUTER (PRINCIPAL)
    # =================================
    openai:
      base-url: https://openrouter.ai/api
      api-key: ${OPENROUTER_API_KEY}

      chat:
        options:
          model: ${OPENROUTER_CHAT_MODEL:qwen/qwen3.5-35b-a3b}   # MODEL PRINCIPAL
          temperature: 0.7
          max-tokens: 4096

      # embedding principal RAG
      embedding:
        options:
          model: google/gemini-embedding-001

    # =================================
    # CHAT MEMORY (inchangé)
    # =================================
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never


# ─────────────────────────────────────────────
# CONFIG AI
# ─────────────────────────────────────────────
penpot:
  ai:
    provider: ${AI_PROVIDER:openrouter}   # ajout propre

    server-address: ${PENPOT_SERVER_ADDRESS:localhost}
    websocket-port: ${PENPOT_WEBSOCKET_PORT:8080}

    rag:
      templates-path: ${PENPOT_RAG_TEMPLATES_PATH:classpath:data/rag/templates/*.json}
      similarity-threshold: ${PENPOT_RAG_SIMILARITY_THRESHOLD:0.5}
      top-k: ${PENPOT_RAG_TOP_K:3}
      query-variants: ${PENPOT_RAG_QUERY_VARIANTS:2}
      eager-embedding: true


# ─────────────────────────────────────────────
# CORS (INCHANGÉ ❗)
# ─────────────────────────────────────────────
cors:
  allowed-origins: >
    http://10.130.163.57,
    https://10.130.163.57,
    http://10.130.163.62:11434/,
    https://10.130.163.62:11434/,
    http://10.130.163.57:50012,
    https://10.130.163.57:50012,
    http://10.130.163.57:50030,
