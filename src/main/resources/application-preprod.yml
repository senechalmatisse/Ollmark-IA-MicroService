# ─────────────────────────────────────────────
# LOGGING (INCHANGÉ + openai ajouté)
# ─────────────────────────────────────────────
logging:
  level:
    com.penpot.ai: INFO
    org.springframework.ai.chat.client: INFO
    org.springframework.ai.rag: INFO
    org.springframework.ai.ollama: INFO
    org.springframework.ai.openai: INFO   # 
    org.springframework.web.socket: WARN
    org.springframework.web.client: WARN