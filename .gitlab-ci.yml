stages:
  - lint
  - sonar
  - build
  - secret-detection
  - test
  - build-image
  - scan
  - dast
  - acceptance
  - deploy

variables:
  DOCKER_REGISTRY: gitlab-dpt-info-sciences.univ-rouen.fr:5555
  BACKEND_IMAGE_NAME: ${DOCKER_REGISTRY}/${CI_PROJECT_PATH}/backend
  BACKEND_IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  MAVEN_CLI_OPTS: "--batch-mode"
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

cache:
  paths:
    - .m2/repository
    - target/
    - "${SONAR_USER_HOME}/cache"

# -----------------------------------------------------------------------------
# STAGE LINT
# -----------------------------------------------------------------------------
checkstyle:
  stage: lint
  image: maven:3.9-eclipse-temurin-21
  script:
    - mvn checkstyle:check -Dcheckstyle.violationSeverity=error
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH =~ /^(feat|feature)\/.*/
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  artifacts:
    when: always
    paths:
      - target/checkstyle-result.xml
    reports:
      junit: target/checkstyle-result.xml

# -----------------------------------------------------------------------------
# STAGE SONAR (UNIQUEMENT PROD)
# -----------------------------------------------------------------------------
sonar_back:
  stage: sonar
  image: maven:3-eclipse-temurin-21
  script:
    - mvn verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
      -Dsonar.qualitygate.wait=true # <--- AJOUTE CECI
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - checkstyle

# -----------------------------------------------------------------------------
# STAGE BUILD
# -----------------------------------------------------------------------------
build-backend:
  stage: build
  image: maven:3.9-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH =~ /^(feat|feature)\/.*/
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  artifacts:
    paths:
      - target/*.jar
    expire_in: 30 days
  needs:
    - job: checkstyle
    - job: sonar_back
      optional: true # Car sonar ne tourne que sur main

# -----------------------------------------------------------------------------
# STAGE TEST (UNIT & INTEGRATION)
# -----------------------------------------------------------------------------
include:
  - template: Security/Secret-Detection.gitlab-ci.yml

# On surcharge le job du template pour l'intégrer à tes règles
secret_detection:
  stage: secret-detection
  needs: ["build-backend"]
  rules:
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
backend-unit-test:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS clean verify
  allow_failure: false
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH =~ /^(feat|feature)\/.*/
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  artifacts:
    when: always
    paths:
      - target/site/jacoco/
    reports:
      junit: target/surefire-reports/TEST-*.xml
  coverage: "/Total.*?([0-9]{1,3})%/"
  needs:
    - job: build-backend
      optional: true # Sur feat, Maven compilera pendant le test car build-backend est absent

backend-integration-test:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  script:
    - mvn test -Dtest.groups=integrationTest
  allow_failure: false
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH =~ /^(feat|feature)\/.*/
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - job: build-backend
      optional: true

# -----------------------------------------------------------------------------
# STAGE BUILD IMAGE
# -----------------------------------------------------------------------------
build-backend-image:
  stage: build-image
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $DOCKER_REGISTRY
    - docker build -t $BACKEND_IMAGE_NAME:$BACKEND_IMAGE_TAG -t $BACKEND_IMAGE_NAME:latest .
    - docker push $BACKEND_IMAGE_NAME:$BACKEND_IMAGE_TAG
    - docker push $BACKEND_IMAGE_NAME:latest
  after_script:
    - docker system prune -af || true

  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - build-backend
    - backend-unit-test

# -----------------------------------------------------------------------------
# STAGE SCAN & DAST (PREPROD & PROD)
# -----------------------------------------------------------------------------
trivy-backend:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
    TRIVY_AUTH_URL: $DOCKER_REGISTRY
    TRIVY_CACHE_DIR: ".trivycache/" # On déplace le cache dans le dossier du projet
  cache:
    key: trivy-db-cache
    paths:
      - .trivycache/
  script:
    # 1. Nettoyage initial des fichiers temporaires pour libérer de l'espace
    - trivy clean --scan-cache

    # 2. Premier passage : Affichage informatif (ne bloque pas) pour les vulnérabilités HIGH
    - trivy image --exit-code 0 --severity HIGH --cache-dir $TRIVY_CACHE_DIR $BACKEND_IMAGE_NAME:$BACKEND_IMAGE_TAG

    # 3. Second passage : BLOQUANT (exit 1) si des vulnérabilités CRITICAL sont trouvées
    - trivy image --exit-code 1 --severity CRITICAL --cache-dir $TRIVY_CACHE_DIR $BACKEND_IMAGE_NAME:$BACKEND_IMAGE_TAG
  after_script:
    # Optionnel : Nettoyage après exécution pour ne pas encombrer le runner
    - rm -rf .trivycache/tmp
  rules:
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"

  needs: ["build-backend-image"]

dast-zap-backend:
  stage: dast
  image: { name: "ghcr.io/zaproxy/zaproxy:stable", entrypoint: [""] }
  script:
    - mkdir -p /zap/wrk

    - echo "Scan DAST sur le backend de la VM..."
    - zap-baseline.py -t http://10.130.163.57:50030 -I -l WARN -J $CI_PROJECT_DIR/zap-report.json
  rules:
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  artifacts:
    when: always
    paths: [zap-report.json]
  allow_failure: true
  needs: ["build-backend-image"]

# -----------------------------------------------------------------------------
# STAGE ACCEPTANCE (PREPROD & PROD)
# -----------------------------------------------------------------------------
bruno-tests:
  stage: acceptance
  image: node:20-alpine
  script:
    - npm install -g @usebruno/cli
    - echo "Lancement des tests Bruno sur la VM..."
    # On passe l'URL de la VM via --env-var
    - cd bruno && bru run . --env-var base_url=http://10.130.163.57:50030

  rules:
    - if: $CI_COMMIT_BRANCH == "preprod"
    - if: $CI_COMMIT_BRANCH == "main"
  needs: ["build-backend-image"]

# -----------------------------------------------------------------------------
# STAGE DEPLOY
# -----------------------------------------------------------------------------
deploy-develop:
  stage: deploy
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    # Recreate SSH key from Base64
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY_BASE64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    # Add VM host to known_hosts to avoid SSH prompt
    - ssh-keyscan -H $VM_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=no $VM_USER@$VM_HOST << EOF
              cd ~/ollmark-backend/ms-ollmark-ia
              
              # --- INITIALISATION (Écrase le fichier existant) ---
              echo "# CONFIGURATION GENEREE PAR GITLAB CI" > .env
              
              # --- SERVEUR PENPOT ---
              echo "PENPOT_SERVER_ADDRESS=$PENPOT_SERVER_ADDRESS" >> .env
              echo "PENPOT_WEBSOCKET_PORT=$PENPOT_WEBSOCKET_PORT" >> .env
              echo "PENPOT_REPL_PORT=$PENPOT_REPL_PORT" >> .env
              echo "PENPOT_REMOTE_MODE=$PENPOT_REMOTE_MODE" >> .env
              echo "PENPOT_MULTI_USER=$PENPOT_MULTI_USER" >> .env
              echo "CRYPTO_MASTER_KEY=$CRYPTO_MASTER_KEY" >> .env
              echo "SWAGGER_PASSWORD=$SWAGGER_PASSWORD" >> .env

              # --- AI DUAL-MODEL (ROUTER) ---
              echo "PENPOT_ROUTER_MODEL=$PENPOT_ROUTER_MODEL" >> .env
              echo "PENPOT_ROUTER_TEMPERATURE=$PENPOT_ROUTER_TEMPERATURE" >> .env
              echo "PENPOT_ROUTER_MAX_TOKENS=$PENPOT_ROUTER_MAX_TOKENS" >> .env

              # --- AI DUAL-MODEL (EXECUTOR) ---
              echo "PENPOT_EXECUTOR_MODEL=$PENPOT_EXECUTOR_MODEL" >> .env
              echo "PENPOT_EXECUTOR_TEMPERATURE=$PENPOT_EXECUTOR_TEMPERATURE" >> .env
              echo "PENPOT_EXECUTOR_MAX_TOKENS=$PENPOT_EXECUTOR_MAX_TOKENS" >> .env
              echo "PENPOT_EXECUTOR_NUM_CTX=$PENPOT_EXECUTOR_NUM_CTX" >> .env

              # --- CHAT MEMORY & RAG ---
              echo "PENPOT_CHAT_MEMORY_MAX_MESSAGES=$PENPOT_CHAT_MEMORY_MAX_MESSAGES" >> .env
              echo "PENPOT_RAG_TEMPLATES_PATH=$PENPOT_RAG_TEMPLATES_PATH" >> .env
              echo "PENPOT_RAG_SIMILARITY_THRESHOLD=$PENPOT_RAG_SIMILARITY_THRESHOLD" >> .env
              echo "PENPOT_RAG_TOP_K=$PENPOT_RAG_TOP_K" >> .env
              echo "PENPOT_RAG_QUERY_VARIANTS=$PENPOT_RAG_QUERY_VARIANTS" >> .env

              # --- OLLAMA & LOGS ---
              echo "OLLAMA_BASE_URL=$OLLAMA_BASE_URL" >> .env
              echo "OLLAMA_EMBEDDING_MODEL=$OLLAMA_EMBEDDING_MODEL" >> .env
              echo "SPRING_AI_LOG_PROMPT=$SPRING_AI_LOG_PROMPT" >> .env
              echo "PENPOT_LOG_LEVEL=$PENPOT_LOG_LEVEL" >> .env
              echo "PENPOT_LOG_DIR=$PENPOT_LOG_DIR" >> .env
              
              echo "AI_PROVIDER=$AI_PROVIDER" >> .env
              echo "OPENROUTER_API_KEY=$OPENROUTER_API_KEY" >> .env
              echo "OPENROUTER_CHAT_MODEL=$OPENROUTER_CHAT_MODEL" >> .env
              echo "OPENROUTER_EMBEDDING_MODEL=$OPENROUTER_EMBEDDING_MODEL" >> .env

              # --- BDD (Utilisées par Spring Boot et Docker Compose) ---
              echo "SPRING_DATASOURCE_USERNAME=$DB_USER" >> .env
              echo "SPRING_DATASOURCE_PASSWORD=$DB_PASSWORD" >> .env

              # --- DEPLOIEMENT ---
              ./deploy.sh
      EOF
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: on_success
  needs:
    - build-backend-image

deploy-preprod:
  stage: deploy
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    # Recreate SSH key from Base64
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY_BASE64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    # Add VM host to known_hosts to avoid SSH prompt
    - ssh-keyscan -H $VM_HOST_PREPROD >> ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=no $VM_USER@$VM_HOST_PREPROD << EOF
              cd ~/ollmark-backend/ms-ollmark-ia
              
              # --- INITIALISATION (Écrase le fichier existant) ---
              echo "# CONFIGURATION GENEREE PAR GITLAB CI" > .env
              
              # --- SERVEUR PENPOT ---
              echo "PENPOT_SERVER_ADDRESS=$PENPOT_SERVER_ADDRESS" >> .env
              echo "PENPOT_WEBSOCKET_PORT=$PENPOT_WEBSOCKET_PORT" >> .env
              echo "PENPOT_REPL_PORT=$PENPOT_REPL_PORT" >> .env
              echo "PENPOT_REMOTE_MODE=$PENPOT_REMOTE_MODE" >> .env
              echo "PENPOT_MULTI_USER=$PENPOT_MULTI_USER" >> .env
              echo "CRYPTO_MASTER_KEY=$CRYPTO_MASTER_KEY" >> .env
              echo "SWAGGER_PASSWORD=$SWAGGER_PASSWORD" >> .env

              # --- AI DUAL-MODEL (ROUTER) ---
              echo "PENPOT_ROUTER_MODEL=$PENPOT_ROUTER_MODEL" >> .env
              echo "PENPOT_ROUTER_TEMPERATURE=$PENPOT_ROUTER_TEMPERATURE" >> .env
              echo "PENPOT_ROUTER_MAX_TOKENS=$PENPOT_ROUTER_MAX_TOKENS" >> .env

              # --- AI DUAL-MODEL (EXECUTOR) ---
              echo "PENPOT_EXECUTOR_MODEL=$PENPOT_EXECUTOR_MODEL" >> .env
              echo "PENPOT_EXECUTOR_TEMPERATURE=$PENPOT_EXECUTOR_TEMPERATURE" >> .env
              echo "PENPOT_EXECUTOR_MAX_TOKENS=$PENPOT_EXECUTOR_MAX_TOKENS" >> .env
              echo "PENPOT_EXECUTOR_NUM_CTX=$PENPOT_EXECUTOR_NUM_CTX" >> .env

              # --- CHAT MEMORY & RAG ---
              echo "PENPOT_CHAT_MEMORY_MAX_MESSAGES=$PENPOT_CHAT_MEMORY_MAX_MESSAGES" >> .env
              echo "PENPOT_RAG_TEMPLATES_PATH=$PENPOT_RAG_TEMPLATES_PATH" >> .env
              echo "PENPOT_RAG_SIMILARITY_THRESHOLD=$PENPOT_RAG_SIMILARITY_THRESHOLD" >> .env
              echo "PENPOT_RAG_TOP_K=$PENPOT_RAG_TOP_K" >> .env
              echo "PENPOT_RAG_QUERY_VARIANTS=$PENPOT_RAG_QUERY_VARIANTS" >> .env

              # --- OLLAMA & LOGS ---
              echo "OLLAMA_BASE_URL=$OLLAMA_BASE_URL" >> .env
              echo "OLLAMA_EMBEDDING_MODEL=$OLLAMA_EMBEDDING_MODEL" >> .env
              echo "SPRING_AI_LOG_PROMPT=$SPRING_AI_LOG_PROMPT" >> .env
              echo "PENPOT_LOG_LEVEL=$PENPOT_LOG_LEVEL" >> .env
              echo "PENPOT_LOG_DIR=$PENPOT_LOG_DIR" >> .env
              echo "AI_PROVIDER=$AI_PROVIDER" >> .env
              echo "OPENROUTER_API_KEY=$OPENROUTER_API_KEY" >> .env
              echo "OPENROUTER_CHAT_MODEL=$OPENROUTER_CHAT_MODEL" >> .env
              echo "OPENROUTER_EMBEDDING_MODEL=$OPENROUTER_EMBEDDING_MODEL" >> .env

              # --- BDD (Utilisées par Spring Boot et Docker Compose) ---
              echo "SPRING_DATASOURCE_USERNAME=$DB_USER" >> .env
              echo "SPRING_DATASOURCE_PASSWORD=$DB_PASSWORD" >> .env

              # --- DEPLOIEMENT ---
              ./deploy.sh
      EOF

  rules:
    - if: $CI_COMMIT_BRANCH == "preprod"
      when: manual
  needs: ["bruno-tests", "dast-zap-backend", "trivy-backend"]

deploy-prod:
  stage: deploy
  script:
    - echo "Déploiement manuel en PROD après validation TechLead/Client"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  needs: ["bruno-tests", "dast-zap-backend", "trivy-backend"]
